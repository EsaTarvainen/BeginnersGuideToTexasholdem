            let text = "";
            // function that fetches input from HTML, goes through the array, finds matches and builds the answer text
            function search() {
                text = "";
                let players = Number(document.getElementById("players").value);
                let gametype = document.getElementById("gametype").value;
                let stackdepth = document.getElementById("stackdepth").value;
                // Checking if all three dropdown inputs have content
                if (players == "") {
                    text = "Please select the number of players";
                } else if (gametype == "") {
                    text = "Please select a game type";
                } else if (stackdepth == "") {
                    text = "Please select a stack depth";
                } else {
                    let found = false; // No match by default
                    for (let i = 0; i < games.length; i++) {
                        if (players == games[i].players && gametype == games[i].gametype && stackdepth == games[i].stackdepth) {
                            found = true; // We have a match
                            // Calculations
                            let stack = 0;
                            let totalChips = 0;
                            for (let value in games[i].chips) {
                                stack += Number(value) * games[i].chips[value];
                                totalChips += games[i].chips[value];
                            }
                            let stackBB = stack / games[i].bigblind;
                            // Building a chips table
                            let chipsTable = "";
                            for (let value in games[i].chips) {
                                chipsTable += `<tr><td>$${Number(value).toLocaleString("en-US")}</td><td>${games[i].chips[value]}</td></tr>`;
                            }
                            // Building a re-buy table if it's a cash game
                            let rebuyHTML = "";
                            if (games[i].rebuy) {
                                let rebuyStack = 0;
                                let rebuyTable = "";
                                for (let value in games[i].rebuy) {
                                    rebuyStack += Number(value) * games[i].rebuy[value];
                                    rebuyTable += `<tr><td>$${Number(value).toLocaleString("en-US")}</td><td>${games[i].rebuy[value]}</td></tr>`;
                                }
                                let rebuyStackBB = rebuyStack / games[i].bigblind;
                                rebuyHTML = `
        <h4>Rebuy — $${rebuyStack.toLocaleString("en-US")} (${rebuyStackBB} BB):</h4>
        <table>
            ${rebuyTable}
        </table>
    `;
                            }
                            // Building the final answer
                            text += `
    <div class="result-box">
        <h3>Blinds: $${games[i].smallblind.toLocaleString("en-US")} / $${games[i].bigblind.toLocaleString("en-US")}</h3>
        <p>Stack: $${stack.toLocaleString("en-US")} (${stackBB} BB)</p>
        <h4>Chips per player (${totalChips} total):</h4>
        <table>
            ${chipsTable}
        </table>
        ${rebuyHTML}
    </div>
`;
                        }
                    }
                    if (!found) {
                        text = "No results found";
                    }
                }
                showresult();
            }
            function showresult() {
                document.getElementById("answer").innerHTML = text;
